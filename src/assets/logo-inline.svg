<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <linearGradient id="zBlueGradInline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0062ff" />
      <stop offset="100%" stop-color="#0022cc" />
    </linearGradient>
    <linearGradient id="vSilverGradInline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a8b2c1" />
    </linearGradient>
    <linearGradient id="limeGradInline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff3c" />
      <stop offset="100%" stop-color="#00cc30" />
    </linearGradient>
  </defs>

  <!-- Monogram Icon (Scaled and positioned on left) -->
  <g transform="translate(-15, -12) scale(0.28)">
    <path d="M 155 110 L 295 110 L 255 180 L 210 180 L 150 280 L 280 280 L 250 330 L 110 330 L 150 260 L 225 260 L 270 180 L 195 180 L 155 110 Z" fill="url(#zBlueGradInline)" />
    <path d="M 270 165 L 315 165 L 348 260 L 385 110 L 430 110 L 365 330 L 320 330 L 270 165 Z" fill="url(#vSilverGradInline)" />
    <polygon points="315,165 370,165 342,215" fill="url(#limeGradInline)" />
  </g>

  <!-- Typography (ZENVÍXO) -->
  <g transform="translate(115, 54)">
    <text font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="800" font-size="34" letter-spacing="2">
      <tspan fill="url(#zBlueGradInline)">ZEN</tspan><tspan fill="#ffffff">V</tspan><tspan fill="#ffffff" dx="1">I</tspan><tspan fill="#ffffff">XO</tspan>
    </text>
    <!-- Custom green accent above the 'I' -->
    <polygon points="86,-29 92,-29 96,-23 90,-23" fill="url(#limeGradInline)" />
  </g>
</svg>
